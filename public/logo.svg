<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Main gradient -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <!-- Glow gradient -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
    <!-- Gold accent -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle with glow -->
  <circle cx="256" cy="256" r="240" fill="#080810"/>
  <circle cx="256" cy="256" r="220" fill="url(#glowGrad)"/>
  
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#mainGrad)" stroke-width="4"/>
  
  <!-- J letter stylized -->
  <g transform="translate(256, 256)">
    <!-- Main J shape -->
    <path d="M -40 -100 
             L 40 -100 
             L 40 40 
             Q 40 100 0 100 
             Q -40 100 -40 60 
             L -40 40 
             L -10 40 
             L -10 60 
             Q -10 70 0 70 
             Q 10 70 10 40 
             L 10 -70 
             L -40 -70 
             Z" 
          fill="url(#mainGrad)"/>
    
    <!-- Decorative droplet/splash accent -->
    <circle cx="60" cy="-80" r="12" fill="url(#goldGrad)"/>
    <circle cx="75" cy="-60" r="6" fill="url(#goldGrad)" opacity="0.7"/>
    <circle cx="50" cy="-95" r="4" fill="url(#goldGrad)" opacity="0.5"/>
  </g>
  
  <!-- Subtle circuit/data lines suggesting analytics -->
  <g stroke="url(#mainGrad)" stroke-width="2" fill="none" opacity="0.3">
    <path d="M 100 100 L 130 130 L 130 180"/>
    <circle cx="130" cy="190" r="5" fill="url(#mainGrad)" stroke="none"/>
    <path d="M 412 100 L 382 130 L 382 160"/>
    <circle cx="382" cy="170" r="5" fill="url(#mainGrad)" stroke="none"/>
  </g>
</svg>
